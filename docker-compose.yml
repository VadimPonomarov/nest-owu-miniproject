version: 1.0.0
services:

  server:
    build: ./server
    container_name: server
    depends_on:
      - postgres
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres/postgres?schema=public

  postgres:
    image: postgres
    container_name: postgres
    hostname: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5432:5432'

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - '8080:8080'